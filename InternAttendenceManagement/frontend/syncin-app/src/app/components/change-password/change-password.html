<div class="min-h-screen bg-gray-100 flex items-center justify-center p-6">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">Change Password</h1>
    <p class="text-sm text-gray-500 mb-6 text-center">You must change your temporary password before continuing.</p>

    @if (error()) {
    <div class="mb-4 text-sm text-red-600 bg-red-50 border border-red-300 rounded p-2 text-center">
      {{ error() }}
    </div>
    }
    @if (success()) {
    <div class="mb-4 text-sm text-green-700 bg-green-50 border border-green-300 rounded p-2 text-center">
      {{ success() }}
    </div>
    }

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
      <input [(ngModel)]="newPassword" type="password" placeholder="Enter new password"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
      <input [(ngModel)]="confirmPassword" type="password" placeholder="Confirm new password"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <button (click)="onSubmit()"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">
      Change Password
    </button>
  </div>
</div>
