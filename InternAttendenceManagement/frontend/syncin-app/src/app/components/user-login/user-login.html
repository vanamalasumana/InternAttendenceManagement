<div class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-100 flex items-center justify-center px-4 py-8 font-sans" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">

  <!-- USER LOGIN FORM - Material Design 3 Style -->
  <div class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-md backdrop-blur-sm border border-gray-100">
    <!-- Logo / Header -->
    <div class="mb-8">
      <div class="inline-block bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-2xl p-3 mb-4">
        <span class="text-2xl">💼</span>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight">SyncIn Login</h1>
      <p class="text-gray-500 text-sm mt-2">Access your intern dashboard and tracking portal</p>
    </div>

    <!-- Error Message -->
    @if (error()) {
    <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded-lg flex items-start gap-3 animate-slide-down">
      <span class="text-red-500 text-lg flex-shrink-0">⚠️</span>
      <div>
        <p class="text-sm font-medium text-red-900">Login Failed</p>
        <p class="text-xs text-red-700 mt-0.5">{{ error() }}</p>
      </div>
    </div>
    }

    <!-- Form Fields -->
    <div class="space-y-5">
      <!-- Employee ID Field -->
      <div class="group">
        <label class="block text-sm font-semibold text-gray-900 mb-2">Employee ID</label>
        <div class="relative">
          <input [(ngModel)]="empId" type="text" placeholder="e.g. EMP001"
                 class="w-full bg-gray-50 border-2 border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-400 transition-all focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:bg-white" />
          <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">🆔</span>
        </div>
      </div>

      <!-- Password Field -->
      <div class="group">
        <label class="block text-sm font-semibold text-gray-900 mb-2">Password</label>
        <div class="relative">
          <input [(ngModel)]="password" type="password" placeholder="••••••••"
                 class="w-full bg-gray-50 border-2 border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-900 placeholder-gray-400 transition-all focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:bg-white" />
          <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">🔑</span>
        </div>
      </div>
    </div>

    <!-- Login Button -->
    <button (click)="onLogin()"
            class="w-full mt-8 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 active:from-blue-800 active:to-blue-900 text-white font-semibold py-3 rounded-xl transition-all duration-200 shadow-lg hover:shadow-xl hover:-translate-y-0.5 active:shadow-md active:translate-y-0 flex items-center justify-center gap-2">
      <span>✨</span> Sign In to SyncIn
    </button>

    <!-- Footer -->
    <p class="text-xs text-gray-500 text-center mt-6">Secure portal • Contact HR if you need password assistance</p>
  </div>
</div>
